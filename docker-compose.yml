services:
  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    networks:
      - piti

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      POST: 1
      NETWORKS: 0
      VOLUMES: 0
      IMAGES: 0
      EXEC: 0
      SWARM: 0
    networks:
      - piti

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: piti
      POSTGRES_USER: piti
      POSTGRES_PASSWORD: ${DB_PASSWORD:-piti_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piti"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - piti

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - piti

  mcp-bridge:
    build:
      context: packages/mcp-bridge
    image: piti-mcp-bridge
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    networks:
      - piti

volumes:
  pgdata:
  redisdata:

networks:
  piti:
    driver: bridge
