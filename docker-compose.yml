services:
  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - piti

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: piti
      POSTGRES_USER: piti
      POSTGRES_PASSWORD: ${DB_PASSWORD:-piti_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piti"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - piti

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - piti

  mcp-search:
    image: mcp/duckduckgo:latest
    command: ["python", "-m", "duckduckgo_mcp_server.server", "--transport", "sse", "--host", "0.0.0.0", "--port", "5100"]
    ports:
      - "5100:5100"
    restart: unless-stopped
    networks:
      - piti

volumes:
  pgdata:
  redisdata:

networks:
  piti:
    driver: bridge
